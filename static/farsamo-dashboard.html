<!DOCTYPE html>
<html lang="so" class="dark">
<head>
<meta charset="UTF-8">
<title>Dashboard - Adeegyada Farsamada</title>
<!-- Favicon Links -->
<link rel="apple-touch-icon" sizes="180x180" href="Assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="Assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="Assets/favicon-16x16.png">
<link rel="manifest" href="Assets/site.webmanifest">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#FFC107' } } } }</script>
</head>
<body class="bg-gray-900 text-white p-4 sm:p-8">
    <!-- Navigator -->
<div class="bg-gray-800 p-2 mb-6">
    <div class="container mx-auto flex items-center justify-center gap-4">
        <!-- Badhanka Caafimaadka -->
        <a href="/dashboard/caafimaad" id="nav-caafimaad" 
           class="py-2 px-6 rounded-lg font-bold text-sm transition-all duration-300">
           Waaxda Caafimaadka
        </a>

        <!-- Badhanka Farsamada -->
        <a href="/dashboard/farsamo" id="nav-farsamo" 
           class="py-2 px-6 rounded-lg font-bold text-sm transition-all duration-300">
           Waaxda Farsamada
        </a>
    </div>
</div>

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-3xl font-bold">Dalabyada Farsamada</h1>
        <button onclick="logoutUser()" class="bg-red-600 text-white font-bold py-2 px-4 rounded hover:bg-red-500 flex items-center gap-2"><span class="material-symbols-outlined">logout</span> Ka Bax</button>
    </div>
    
    <div class="mb-4 space-y-4 sm:space-y-0 sm:flex sm:justify-between sm:items-center">
        <div class="flex items-center gap-4">
            <div class="flex bg-gray-800 p-1 rounded-lg gap-1">
                <button id="tab-dhamaystiran" onclick="loadOrders('dalabyadaFarsamada')" class="flex-1 py-2 px-4 text-sm font-bold rounded-md">Dhammaystiran</button>
                <button id="tab-qabyo" onclick="loadOrders('dalabyadaFarsamoQabyoAh')" class="flex-1 py-2 px-4 text-sm font-bold rounded-md">Qabyo ah</button>
            </div>
            <button id="deleteAllBtn" onclick="deleteAllOrders()" style="display: none;" class="bg-red-800 text-white font-bold py-2 px-3 rounded-lg hover:bg-red-700 flex items-center gap-2">
                <span class="material-symbols-outlined">delete_sweep</span> Tirtir Dhammaan
            </button>
        </div>
        <div class="relative w-full sm:max-w-xs">
            <input id="search-input" onkeyup="filterTable()" type="text" placeholder="Raadi dalab..." class="w-full bg-gray-700 text-white rounded p-2 pl-10">
            <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">search</span>
        </div>
    </div>
    
    <!-- TIRINTA GUUD OO LA CUSBOONAYSIIYAY -->
    <p id="order-count" class="text-sm text-slate-400 my-2"></p>
    
    <div class="bg-gray-800 rounded-lg shadow-lg overflow-x-auto max-h-[60vh] overflow-y-auto">
        <table class="w-full min-w-[1300px]">
            <thead class="bg-gray-700">
                <tr>
                    <!-- TIIRKA LAMBARKA CUSUB -->
                    <th class="p-3 text-center text-xs font-bold uppercase">#</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Magaca</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Email</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Taleefan</th>
                    <th class="p-3 text-left text-xs font-bold uppercase text-yellow-400">Goobta</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Cinwaanka Shaqada</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Adeegga Guud</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Faahfaahinta</th>
                    <th class="p-3 text-left text-xs font-bold uppercase">Waqtiga</th>
                    <th class="p-3 text-center text-xs font-bold uppercase text-green-400">Jawaab</th>
                    <th class="p-3 text-center text-xs font-bold uppercase">Tallaabo</th>
                </tr>
            </thead>
            <tbody id="orders-table"></tbody>
        </table>
    </div>
</div>

<!-- ========= SCRIPT OO DHAMMAYSTIRAN OO LA SAXAY ========= -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const ADMIN_EMAILS = ["omermohamed1872@gmail.com", "ebalamiservices@gmail.com"];
    let isDashboardAdmin = false;
    
    const firebaseConfig = {
        apiKey: "AIzaSyAq0ZMHARQzJlQDQVdcBrJLSOwrvI1tCLI",
        authDomain: "ebalami-website.firebaseapp.com",
        projectId: "ebalami-website",
        storageBucket: "ebalami-website.firebasestorage.app",
        messagingSenderId: "612434597781",
        appId: "1:612434597781:web:cd46819a426fc8ee60c89c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentCollection = 'dalabyadaFarsamada';
    let allOrdersData = []; 

    function logoutUser() { auth.signOut().then(() => { window.location.href = 'login.html'; }); }
    
     auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = 'login.html'; // Ku celi Login hadduusan jirin
    } else {
        // Hubi haddii user-kan uu liiska Admin-ka ku jiro
        isDashboardAdmin = ADMIN_EMAILS.includes(user.email);

        // Halkan waxaan ku qarinaynaa badhanka weyn ee "Tirtir Dhammaan"
        const deleteAllButton = document.getElementById('deleteAllBtn');
        if (deleteAllButton) {
            // Haddii uu Admin yahay tus, haddii kale qari (none)
            deleteAllButton.style.display = isDashboardAdmin ? 'flex' : 'none';
        }
        
        loadOrders(currentCollection);
    }
});

    function loadOrders(collectionName) {
        currentCollection = collectionName;
        
        document.getElementById('tab-dhamaystiran').classList.toggle('bg-primary', collectionName === 'dalabyadaFarsamada');
        document.getElementById('tab-dhamaystiran').classList.toggle('text-gray-900', collectionName === 'dalabyadaFarsamada');
        document.getElementById('tab-qabyo').classList.toggle('bg-primary', collectionName === 'dalabyadaFarsamoQabyoAh');
        document.getElementById('tab-qabyo').classList.toggle('text-gray-900', collectionName === 'dalabyadaFarsamoQabyoAh');
        
        const tableBody = document.getElementById('orders-table');
        const colspanValue = 10; // Lagu daray 1 sababtoo ah tiirka cusub
        const timeField = 'timestamp';
        
        db.collection(collectionName).orderBy(timeField, "desc").onSnapshot(snapshot => {
            if (snapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="${colspanValue}" class="p-4 text-center">Wax dalab ah kama jiro qaybtan.</td></tr>`; 
                allOrdersData = [];
                document.getElementById('order-count').textContent = "Wax dalab ah lama helin.";
                return;
            }
            allOrdersData = snapshot.docs;
            renderTable(allOrdersData);
        }, error => {
            console.error("Firebase Error: ", error);
            tableBody.innerHTML = `<tr><td colspan="${colspanValue}" class="p-4 text-center text-red-400">Khalad ayaa dhacay.</td></tr>`;
        });
    }
    
 function renderTable(docs) {
    const totalCount = allOrdersData.length;
    document.getElementById('order-count').textContent = `Tirada Guud ee Dalabyada: ${totalCount}`;

    const tableBody = document.getElementById('orders-table');
    
    tableBody.innerHTML = docs.map((doc, index) => { 
        const data = doc.data();
        const date = data.timestamp ? data.timestamp.toDate().toLocaleString('so-SO') : 'Lama hayo';

        // --- HIGHLIGHT LOGIC ---
        const isResponded = data.responded === true;
        
        // Midabka Safka
        const rowColor = isResponded ? 'bg-green-900/30 border-l-4 border-green-500' : 'border-b border-gray-700 hover:bg-gray-700/50';
        
        // Icon-ka Saxda
        const iconBtn = isResponded 
            ? `<span class="material-symbols-outlined text-green-400 text-2xl">check_circle</span>` 
            : `<span class="material-symbols-outlined text-gray-500 text-2xl hover:text-white">radio_button_unchecked</span>`;

        // --- WHATSAPP LOGIC (CUSUB) ---
        const rawPhone = data.phone || '';
        const cleanPhone = rawPhone.replace(/[^0-9]/g, ''); 
        const waLink = cleanPhone ? `https://wa.me/${cleanPhone}` : '#';

        return `<tr class="${rowColor} transition-all duration-300">
            <td class="p-3 text-sm text-center text-slate-400">${index + 1}</td>
            <td class="p-3 text-sm font-medium">${data.name || ''}</td>
            <td class="p-3 text-sm text-cyan-400">${data.email || ''}</td>
            
            <!-- TIIRKA WHATSAPP-KA -->
            <td class="p-3 text-sm">
                 <a href="${waLink}" target="_blank" class="flex items-center justify-start gap-2 text-green-400 hover:text-green-300 hover:underline font-medium" title="Kula hadal WhatsApp">
                    <span class="material-symbols-outlined text-[18px]">chat</span>
                    ${data.phone || ''}
                </a>
            </td>

            <td class="p-3 text-sm font-bold text-yellow-400">${data.location || 'Lama Gelin'}</td>
            <td class="p-3 text-sm">${data.address || ''}</td>
            <td class="p-3 text-sm font-bold">${data.service || ''}</td>
            <td class="p-3 text-sm italic">"${data.details || 'Lama hayo'}"</td>
            <td class="p-3 text-xs text-gray-400">${date}</td>
            
            <!-- BADHANKA TICK-GA (Waa la saxay window.toggleStatus) -->
            <td class="p-3 text-center">
                <button onclick="window.toggleStatus('${currentCollection}', '${doc.id}', ${isResponded})" title="Bedel Xaaladda" class="transition-transform active:scale-95">
                    ${iconBtn}
                </button>
            </td>

            <td class="p-3 text-center">
    ${isDashboardAdmin 
      ? `<button onclick="deleteOrder('${currentCollection}', '${doc.id}')" class="text-red-400 hover:text-red-200"><span class="material-symbols-outlined">delete</span></button>` 
      : '' // Haddii uusan Admin ahayn, waxba ha soo saarin (meel banaan)
    }
</td>
        </tr>`;
    }).join('');
}   


    function filterTable() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allOrdersData.filter(doc => JSON.stringify(doc.data()).toLowerCase().includes(query));
        renderTable(filtered); // Waxaan ka saarnay qoraalkii 'if (!query)' maadaama uusan muhiim ahayn
    }

    function deleteOrder(collection, docId) {
        if (confirm('Ma hubtaa inaad tirtirto dalabkan?')) {
            db.collection(collection).doc(docId).delete().catch(err => alert("Khalad: " + err));
        }
    }

    function deleteAllOrders() {
        if (!isDashboardAdmin) return alert("Kuma fasaxna hawshan.");
        if (allOrdersData.length === 0) return alert("Qaybtan wax dalab ah kuma jiraan.");
        
        if (!confirm(`DIGNIIN!\nMa hubtaa inaad tirtirto DHAMMAAN (${allOrdersData.length}) dalab ee qaybtan?`)) return;

        const batch = db.batch();
        allOrdersData.forEach(doc => {
            batch.delete(db.collection(currentCollection).doc(doc.id));
        });
        batch.commit().then(() => alert('Dhammaan dalabyadii waa la tirtiray.'));
    }
    document.addEventListener("DOMContentLoaded", () => {
    const caafimaadBtn = document.getElementById('nav-caafimaad');
    const farsamoBtn = document.getElementById('nav-farsamo');

    // Style-ka Badhanka Firfircoon (Huruud Buuxa)
    const activeStyle = "bg-primary text-gray-900 shadow-md transform scale-105";
    
    // Style-ka Badhanka Dansan (Qoraal kaliya)
    const inactiveStyle = "text-gray-400 hover:text-white hover:bg-gray-700/50";

    // Hubi URL-ka
    if (window.location.pathname.includes('/farsamo')) {
        // Hadaad Farsamo joogto:
        farsamoBtn.classList.add(...activeStyle.split(" "));
        caafimaadBtn.classList.add(...inactiveStyle.split(" "));
    } else {
        // Hadaad Caafimaad joogto (Default):
        caafimaadBtn.classList.add(...activeStyle.split(" "));
        farsamoBtn.classList.add(...inactiveStyle.split(" "));
    }
    
   // Function-kan banaanka soo dhig (waa muhiim)
window.toggleStatus = function(collection, docId, currentStatus) {
    console.log("Button la riixay:", docId); // Tani waxay ka soo muuqanaysaa Console-ka (F12)

    // Halkan waxaan ku bedelaynaa xaaladda (True <-> False)
    db.collection(collection).doc(docId).update({
        responded: !currentStatus
    }).then(() => {
        console.log("Si guul ah ayaa loo bedelay!");
    }).catch((error) => {
        console.error("Cillad:", error);
        alert("Cillad: " + error.message);
    });
};

// Function-kan wuxuu lambarka ka saarayaa Space-ka iyo calaamadaha, wuxuuna ku darayaa wa.me
function getWhatsAppLink(phoneNumber) {
    if (!phoneNumber) return '#';
    // Ka saar wixii aan lambar ahayn (Space, +, -)
    const cleanNumber = phoneNumber.replace(/[^0-9]/g, '');
    return `https://wa.me/${cleanNumber}`;
}
});
</script>
<!-- ========================================================== -->
</body>
</html>
